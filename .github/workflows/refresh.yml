name: Refresh Projections

on:
  schedule:
    - cron: "0 1 * * *"    # 9 PM ET — tomorrow's pitcher props for night-before planning
    - cron: "0 6 * * *"    # 2 AM ET — grade last night's slate so /results lands by morning
    - cron: "0 12 * * *"   # 8 AM ET — refresh pitcher props, late starter changes
    - cron: "0 17 * * *"   # 1 PM ET — add hitter props once lineups post
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Confirm the runner is on the latest master and that the engine files
      # actually contain the code we expect to run. Stale-output reports usually
      # turn out to be queued-run artifacts, but printing the commit + key file
      # mtimes makes the next failure diagnosable from the log alone.
      - name: Debug — confirm checkout is fresh
        run: |
          echo "=== git ==="
          git rev-parse HEAD
          git log --oneline -3
          echo "=== engine file mtimes ==="
          ls -la engine/model.py engine/stats.py engine/fetch.py engine/main.py
          echo "=== sanity grep — strings unique to the current refactor ==="
          grep -n "_fetch_bulk_statcast" engine/model.py || echo "MISSING: model.py is stale"
          grep -n "_team_k_pcts" engine/stats.py || echo "MISSING: stats.py is stale"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Run projection pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PARLAY_API_KEY: ${{ secrets.PARLAY_API_KEY }}
        run: python engine/main.py
