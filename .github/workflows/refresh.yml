name: Refresh Projections

on:
  schedule:
    # Nine runs/day. First run of the day does a full projection pass;
    # subsequent runs detect that projections already exist for today
    # and skip the expensive baseline + XGBoost work, just refreshing
    # lines + edges + calibration (and filling in late-posting lineups).
    # See engine/main.py for the gates.
    #
    # The 5 PM + 7 PM ET runs close the old 2 PM -> 8 PM ET gap: evening-game
    # batting lineups post ~60-90 min before first pitch (so ~4:30-7 PM ET for
    # 6-8 PM starts) and were NOT built until the 8 PM run — often after first
    # pitch — so pre-game hitter analysis was missing for those games. These two
    # runs build them via the _run_hitter_pipeline fill-in within ~1h of the
    # lineup posting. Kept to TWO extra runs to respect the ParlayAPI credit
    # budget (1000/month, 3 credits/run): 9 runs/day ~= 810/month.
    - cron: "0 1 * * *"    # 9:00 PM ET — pitcher lines night before
    - cron: "0 5 * * *"    # 1:00 AM ET — overnight line updates
    - cron: "0 11 * * *"   # 7:00 AM ET — morning pitcher refresh
    - cron: "0 14 * * *"   # 10:00 AM ET — late pitcher + early hitter lines
    - cron: "0 17 * * *"   # 1:00 PM ET — main hitter lineup window
    - cron: "0 18 * * *"   # 2:00 PM ET — early game final capture
    - cron: "0 21 * * *"   # 5:00 PM ET — early-evening lineup window (build
                           #              hitters as evening lineups post)
    - cron: "0 23 * * *"   # 7:00 PM ET — evening lineup window (pre-game hitter
                           #              coverage before first pitch)
    - cron: "0 0 * * *"    # 8:00 PM ET — West Coast lineup window (fills in
                           #              late-posting hitter games via the
                           #              _run_hitter_pipeline fill-in)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Confirm the runner is on the latest master and that the engine files
      # actually contain the code we expect to run. Stale-output reports usually
      # turn out to be queued-run artifacts, but printing the commit + key file
      # mtimes makes the next failure diagnosable from the log alone.
      - name: Debug — confirm checkout is fresh
        run: |
          echo "=== git ==="
          git rev-parse HEAD
          git log --oneline -3
          echo "=== engine file mtimes ==="
          ls -la engine/model.py engine/stats.py engine/fetch.py engine/main.py
          echo "=== sanity grep — strings unique to the current refactor ==="
          grep -n "_fetch_bulk_statcast" engine/model.py || echo "MISSING: model.py is stale"
          grep -n "_team_k_pcts" engine/stats.py || echo "MISSING: stats.py is stale"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Run projection pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PARLAY_API_KEY: ${{ secrets.PARLAY_API_KEY }}
          # Optional — when set, engine/weather.py populates the
          # temperature_f / wind / precipitation columns on grade rows.
          # When absent, those columns log NULL and one reminder line
          # is printed; the pipeline runs the same either way.
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          # Optional — a residential proxy (http://user:pass@host:port) for the
          # PrizePicks-direct fantasy fetch. Cloudflare 403s this runner's
          # datacenter IP; with a proxy set, authentic standard fantasy lines
          # work in CI. When absent, the fetch falls back to ladder/median
          # exactly as before.
          PRIZEPICKS_PROXY_URL: ${{ secrets.PRIZEPICKS_PROXY_URL }}
        run: python engine/main.py
